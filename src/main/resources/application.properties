# Habilitar la interfaz de Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Información general de la API de Tenis
mp.openapi.extensions.smallrye.info.title=Liga de Tenis API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API para la gestión de ligas, partidos y tablas de posiciones de tenis.

quarkus.http.port=8080

# Apagar Dev Services automáticos para evitar que despierte Testcontainers
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false

# Configuración manual para tu PostgreSQL local/contenedor
quarkus.datasource.db-kind=postgresql
quarkus.datasource.reactive.url=postgresql://localhost:5432/tennis_db
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.sql-load-script=no-file

# 1. Le dice a la extensión REST que use el formato de integración HTTP convencional en local
quarkus.amazon-lambda-rest.javars-security-enabled=false

# 2. Desactiva el Mock Server para que no intente emular los payloads de AWS en el puerto 8080
quarkus.amazon-lambda.mock-event-server.dev-ui-band=false

# 3. Evita que la seguridad intente buscar proveedores externos en el arranque de desarrollo
quarkus.security.auth.enabled-in-dev-mode=false

quarkus.hibernate-validator.jaxrs.use-default-mapper=false

quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:5173
quarkus.http.cors.headers=accept, authorization, content-type
quarkus.http.cors.methods=GET, POST, PUT, PATCH, DELETE, OPTIONS

# ==========================================
# CONFIGURACIÓN GLOBAL / AGUJEROS COMUNES
# ==========================================
# Indicamos que el backend solo validará tokens (Resource Server)
quarkus.oidc.application-type=service

# ==========================================
# 🐳 PERFIL: DEVELOPMENT (TU KEYCLOAK ACTUAL)
# ==========================================
%dev.quarkus.oidc.auth-server-url=http://localhost:8180/realms/quarkus
%dev.quarkus.oidc.client-id=backend-service
# Keycloak mete los roles en realm_access.roles por defecto
%dev.quarkus.oidc.roles.role-claim-path=realm_access/roles

# ==========================================
# ☁️ PERFIL: PRODUCTION (AWS COGNITO)
# ==========================================
# Cognito usa una estructura de URL estándar basada en tu región y User Pool ID
%prod.quarkus.oidc.auth-server-url=https://cognito-idp.{aws-region}.amazonaws.com/{user-pool-id}
# El Client ID que te genere el App Client de Cognito
%prod.quarkus.oidc.client-id={cognito-app-client-id}
# 🎯 Mapeo para producción: Cognito guarda los grupos en "cognito:groups"
%prod.quarkus.oidc.roles.role-claim-path=cognito:groups